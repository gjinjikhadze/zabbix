name: "CodeQL – Zabbix UI (OWASP Top 10)"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '43 8 * * 6'

jobs:
  analyze:
    name: Analyze UI (javascript-typescript)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
          # OWASP Top 10 coverage via security-extended:
          # A01 Broken Access Control     → js/missing-rate-limiting, js/cors-misconfiguration
          # A02 Cryptographic Failures    → js/weak-cryptographic-algorithm, js/insufficient-key-size
          # A03 Injection (XSS/SQLi)      → js/xss, js/xss-through-dom, js/sql-injection
          # A04 Insecure Design           → js/hardcoded-credentials
          # A05 Security Misconfiguration → js/cors-misconfiguration
          # A06 Vulnerable Components     → flagged via known-vulnerable patterns
          # A07 Auth Failures             → js/insecure-randomness, js/jwt-missing-verification
          # A08 Integrity Failures        → js/code-injection
          # A09 Logging Failures          → js/clear-text-logging
          # A10 SSRF                      → js/request-forgery
          queries: security-extended
          config: |
            paths:
              - "ui/**"
            paths-ignore:
              - "ui/vendor/**"
              - "ui/js/vendors/**"
              - "ui/**/*.min.js"
              - "ui/**/*.min.css"
            query-filters:
              - exclude:
                  precision: low
                  tags contain: "maintainability"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
          upload: true
          ram: 4096
