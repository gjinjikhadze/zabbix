            <!-- OWASP coverage grid -->
            <div class="section-title">OWASP Top 10 2021 Coverage</div>
            <div class="owasp-grid">
              <div class="owasp-card"><div class="id">A01</div><div class="name">Broken Access Control</div><div class="tools">CodeQL · Semgrep custom rules</div></div>
              <div class="owasp-card"><div class="id">A02</div><div class="name">Cryptographic Failures</div><div class="tools">Semgrep (weak random, MD5, hardcoded) · Gitleaks</div></div>
              <div class="owasp-card"><div class="id">A03</div><div class="name">Injection (SQLi, CMDi, XSS…)</div><div class="tools">CodeQL · Semgrep · PHPCS-Security</div></div>
              <div class="owasp-card"><div class="id">A04</div><div class="name">Insecure Design</div><div class="tools">PHPStan · Semgrep</div></div>
              <div class="owasp-card"><div class="id">A05</div><div class="name">Security Misconfiguration</div><div class="tools">Semgrep · PHPCS-Security</div></div>
              <div class="owasp-card"><div class="id">A06</div><div class="name">Vulnerable Components</div><div class="tools">OSV-Scanner · npm audit</div></div>
              <div class="owasp-card"><div class="id">A07</div><div class="name">Auth Failures</div><div class="tools">CodeQL · Semgrep</div></div>
              <div class="owasp-card"><div class="id">A08</div><div class="name">Software & Data Integrity</div><div class="tools">CodeQL · Semgrep (unserialize, eval, include)</div></div>
              <div class="owasp-card"><div class="id">A09</div><div class="name">Logging Failures</div><div class="tools">Semgrep (manual review flagged)</div></div>
              <div class="owasp-card"><div class="id">A10</div><div class="name">SSRF</div><div class="tools">CodeQL · Semgrep (curl, file_get_contents)</div></div>
            </div>

            <!-- Next steps -->
            <div class="section-title">Triage Workflow</div>
            <table>
              <thead><tr><th>Priority</th><th>Action</th><th>Where</th></tr></thead>
              <tbody>
                <tr><td>1️⃣ Critical / High</td><td>Review immediately in GitHub Security tab → Code scanning alerts, filter by severity</td><td>Security → Code scanning</td></tr>
                <tr><td>2️⃣ Secrets</td><td>Rotate any credentials found by Gitleaks; check full git history</td><td>Security → Secret scanning</td></tr>
                <tr><td>3️⃣ Outdated deps</td><td>Review OSV-Scanner SARIF and npm audit JSON</td><td>dependency-scan artifact</td></tr>
                <tr><td>4️⃣ PHP logic</td><td>Review PHPCS Security Audit JSON + PHPStan JSON</td><td>php-deep-scan artifact</td></tr>
                <tr><td>5️⃣ Custom rules</td><td>Review semgrep-custom-summary.txt for Zabbix-specific patterns</td><td>sarif-semgrep artifact</td></tr>
              </tbody>
            </table>

            <footer>
              Generated by Zabbix UI Comprehensive Security Audit Workflow · 
              ${{ github.repository }} · Run #${{ github.run_number }}
            </footer>
          </body>
          </html>
          HTMLEOF

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: final-report/
          retention-days: 30

      # ── Optional: comment on PR with summary ───────────────
      - name: Comment on PR with findings summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total   = '${{ steps.counts.outputs.total }}';
            const cqlPHP  = '${{ steps.counts.outputs.codeql_php }}';
            const cqlJS   = '${{ steps.counts.outputs.codeql_js }}';
            const sgPHP   = '${{ steps.counts.outputs.semgrep_php }}';
            const sgJS    = '${{ steps.counts.outputs.semgrep_js }}';
            const secrets = '${{ steps.counts.outputs.gitleaks }}';
            const runUrl  = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const emoji = parseInt(total) === 0 ? '✅' : (parseInt(secrets) > 0 ? '🚨' : '⚠️');

            const body = [
              `## ${emoji} Zabbix UI Security Scan — ${total} finding(s)`,
              '',
              '| Scanner | Language | Findings |',
              '|---------|----------|----------|',
              `| CodeQL | PHP | ${cqlPHP} |`,
              `| CodeQL | JavaScript | ${cqlJS} |`,
              `| Semgrep | PHP | ${sgPHP} |`,
              `| Semgrep | JavaScript | ${sgJS} |`,
              `| Gitleaks | Secrets | ${secrets} |`,
              '',
              `📊 [Full run details](${runUrl}) · Download the \`security-audit-report\` artifact for the HTML dashboard.`,
              '',
              '> _All findings are also visible in **Security → Code scanning alerts** on the repository._'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Optional: fail the build if high findings exist ────
      - name: Fail if HIGH/CRITICAL findings present
        if: inputs.fail_on_high == 'true'
        run: |
          TOTAL=${{ steps.counts.outputs.total }}
          if [ "$TOTAL" -gt "0" ]; then
            echo "::error::$TOTAL security finding(s) detected. Review Security tab."
            exit 1
          fi
