            </div>

            <!-- Tool coverage table -->
            <div class="section-title">Scanner Coverage</div>
            <table>
              <thead>
                <tr>
                  <th>Scanner</th><th>Languages</th><th>OWASP Categories</th>
                  <th>Findings</th><th>Artifacts</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><strong>CodeQL</strong></td>
                  <td>PHP, JavaScript</td>
                  <td>A01–A03, A07–A10</td>
                  <td>${{ steps.counts.outputs.codeql_php }} / ${{ steps.counts.outputs.codeql_js }}</td>
                  <td>GitHub Security tab → Code scanning</td>
                </tr>
                <tr>
                  <td><strong>Semgrep</strong></td>
                  <td>PHP, JavaScript</td>
                  <td>All A01–A10 + custom Zabbix rules</td>
                  <td>${{ steps.counts.outputs.semgrep_php }} / ${{ steps.counts.outputs.semgrep_js }}</td>
                  <td>GitHub Security tab + sarif-semgrep artifact</td>
                </tr>
                <tr>
                  <td><strong>PHPCS Security Audit</strong></td>
                  <td>PHP</td>
                  <td>A03, A07, A08</td>
                  <td>See php-deep-scan artifact</td>
                  <td>php-deep-scan/phpcs-*.json</td>
                </tr>
                <tr>
                  <td><strong>PHPStan</strong></td>
                  <td>PHP</td>
                  <td>A04, A08</td>
                  <td>See php-deep-scan artifact</td>
                  <td>php-deep-scan/phpstan.json</td>
                </tr>
                <tr>
                  <td><strong>Gitleaks</strong></td>
                  <td>All files + git history</td>
